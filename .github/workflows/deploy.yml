name: Deploy to Netlify

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clean stale build artifacts
        run: rm -rf .netlify .next

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          FAL_WEBHOOK_SECRET: ${{ secrets.FAL_WEBHOOK_SECRET }}

      - name: Sync environment variables to Netlify
        run: |
          npx netlify-cli env:set NEXT_PUBLIC_SUPABASE_URL '${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}'
          npx netlify-cli env:set NEXT_PUBLIC_SUPABASE_ANON_KEY '${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}'
          npx netlify-cli env:set SUPABASE_SERVICE_ROLE_KEY '${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}'
          npx netlify-cli env:set FAL_KEY '${{ secrets.FAL_KEY }}'
          npx netlify-cli env:set REDIS_URL '${{ secrets.REDIS_URL }}'
          npx netlify-cli env:set NEXT_PUBLIC_SITE_URL '${{ secrets.NEXT_PUBLIC_SITE_URL }}'
          npx netlify-cli env:set NEXT_PUBLIC_APP_URL '${{ secrets.NEXT_PUBLIC_APP_URL }}'
          npx netlify-cli env:set FAL_WEBHOOK_SECRET '${{ secrets.FAL_WEBHOOK_SECRET }}'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify (Production)
        if: github.ref == 'refs/heads/main'
        run: npx netlify-cli deploy --prod --dir=.next --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Deploy to Netlify (Preview)
        if: github.ref != 'refs/heads/main'
        run: npx netlify-cli deploy --dir=.next --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}